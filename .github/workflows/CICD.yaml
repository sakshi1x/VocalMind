name: CICD
on:
  push:
    branches:
      - dev
    paths:
      - 'services/**'
      - 'shared/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag"
        required: true
        default: "dev"

env:
  REGISTRY_OWNER: rumsan

jobs:
  build-and-push:
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v4

      - name: Import secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_URL }}
          token: ${{ secrets.VAULT_TOKEN }}
          secrets: |
            github/data/rumsan-ai/chatty-be/Docker DOCKER_USERNAME | DOCKER_USERNAME ;
            github/data/rumsan-ai/chatty-be/Docker DOCKER_PASSWORD | DOCKER_PASSWORD ;

      - name: Set image tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "IMAGE_TAG=${{ github.event.inputs.image_tag }}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=sha-$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV
          fi

      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: |
            image=moby/buildkit:latest
            network=host
          buildkitd-config-inline: |
            [dns]
              nameservers = ["8.8.8.8", "1.1.1.1"]

      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            rumsan/grievance-ai:${{ env.IMAGE_TAG }}
            rumsan/grievance-ai:sha-${{ github.sha }}
          network: host
          provenance: false
          cache-from: type=gha,scope=grievance-ai
          cache-to: type=gha,mode=max,scope=grievance-ai
