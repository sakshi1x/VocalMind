

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sentiment_db}
      POSTGRES_USER: ${POSTGRES_USER:-sakshi-rumsan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rumsan}
    ports:
      - "${POSTGRES_PORT_HOST:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sakshi-rumsan}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT_HOST:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-sentiment}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-password}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 5s
      retries: 5

  app:
    platform: linux/amd64

    build:
      context: .
      dockerfile: Dockerfile

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

    env_file: .env

    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      RABBIT_URL: ${RABBIT_URL:-amqp://sentiment:password@rabbitmq:5672/}
      HOST: 0.0.0.0
      PORT: ${API_PORT:-8000}
      DEV_RELOAD: "false"

    ports:
      - "${API_PORT:-8000}:8000"

    volumes:
      - ./:/app:delegated
      - /Users/rumsan/Documents/apps/grievance-ai-system/services/asr-service/model_cache:/app/services/asr-service/model_cache
      - nlp_model_cache:/app/uploads/model_cache

    command: ["bash", "/app/scripts/run_migrations.sh"]

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  asr_model_cache:
  nlp_model_cache:
